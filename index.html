<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI와 인간: 새로운 공존의 시대</title>
  <style>
    :root {
      --bg-gradient: radial-gradient(circle at top, #1f2937 0, #020617 45%, #020617 100%);
      --card-bg: #0b1120;
      --card-border: rgba(148, 163, 184, 0.4);
      --accent: #38bdf8;
      --accent-soft: rgba(56,189,248,0.1);
      --text-main: #e5e7eb;
      --text-muted: #9ca3af;
      --badge-insight: #4ade80;
      --badge-fiction: #c084fc;
      --radius: 14px;
      --shadow-soft: 0 18px 45px rgba(15,23,42,0.6);
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto,
        "Noto Sans KR", "Apple SD Gothic Neo", "맑은 고딕", Arial, sans-serif;
      background: var(--bg-gradient);
      color: var(--text-main);
      line-height: 1.6;
    }

    .wrap {
      max-width: 1200px;
      margin: 40px auto 56px;
      padding: 0 20px;
    }

    header.site {
      text-align: left;
      margin-bottom: 32px;
    }

    header.site h1 {
      font-size: 28px;
      margin: 0 0 10px;
      letter-spacing: 0.04em;
    }

    header.site p.lead {
      margin: 0 0 6px;
      color: var(--text-muted);
      font-size: 15px;
    }

    header.site .tagline {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 6px 12px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.4);
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 10px;
      background: rgba(15,23,42,0.6);
    }

    header.site .tag-dot {
      width: 7px;
      height: 7px;
      border-radius: 999px;
      background: var(--accent);
      box-shadow: 0 0 0 4px var(--accent-soft);
    }

    .section-block {
      margin-top: 36px;
    }

    .section-header {
      display: flex;
      align-items: baseline;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 8px;
    }

    .section-title {
      font-size: 20px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
    }

    .section-pill {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      padding: 2px 8px;
      border-radius: 999px;
      border: 1px solid rgba(148,163,184,0.4);
      color: var(--text-muted);
    }

    .section-desc {
      font-size: 13px;
      color: var(--text-muted);
      max-width: 520px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
    }

    .card {
      background: linear-gradient(145deg, rgba(15,23,42,0.95), rgba(15,23,42,0.9));
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--card-border);
      display: flex;
      flex-direction: column;
      cursor: pointer;
      text-decoration: none;
      color: inherit;
      transform: translateY(0) translateZ(0);
      transition: transform 0.18s ease, box-shadow 0.18s ease, border-color 0.18s ease, background 0.18s ease;
      position: relative;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0;
      background: radial-gradient(circle at top, rgba(56,189,248,0.25), transparent 55%);
      transition: opacity 0.18s ease;
      pointer-events: none;
    }

    .card:hover {
      transform: translateY(-6px);
      box-shadow: 0 26px 60px rgba(15,23,42,0.9);
      border-color: rgba(148,163,184,0.7);
    }

    .card:hover::before { opacity: 1; }

    .cover-wrap {
      position: relative;
      overflow: hidden;
      border-bottom: 1px solid rgba(15,23,42,0.9);
    }

    .cover {
      width: 100%;
      height: auto;
      aspect-ratio: 3/4;
      object-fit: cover;
      display: block;
      background: #020617;
      transition: transform 0.25s ease;
    }

    .card:hover .cover { transform: scale(1.05); }

    .body {
      padding: 14px 14px 16px;
      display: flex;
      flex-direction: column;
      gap: 6px;
      flex: 1;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      font-size: 11px;
      font-weight: 600;
      color: #0b1120;
      padding: 2px 9px;
      border-radius: 999px;
      margin-bottom: 4px;
    }

    .badge-insight { background-color: var(--badge-insight); }
    .badge-fiction { background-color: var(--badge-fiction); }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #0b1120;
      opacity: 0.7;
    }

    .title {
      font-weight: 600;
      font-size: 16px;
      margin: 0;
      line-height: 1.4;
    }

    .desc {
      font-size: 13px;
      color: #e5e7eb;
      margin: 0;
      opacity: 0.85;
    }

    @media (max-width: 768px) {
      header.site h1 { font-size: 22px; }
      .section-title { font-size: 18px; }
    }
  </style>

  <script>
    function goLibrary(title) {
      try {
        if (navigator.clipboard && window.isSecureContext) {
          navigator.clipboard.writeText(title.trim());
        }
      } catch (e) {}
      const query = encodeURIComponent(title.trim());
      const url = `https://umyeon.seocholib.or.kr/TotalSearch?keyword=${query}`;
      window.open(url, '_blank', 'noopener');
    }
  </script>
</head>
<body>

      <p class="lead">우면도서관 북큐레이션: AI 시대를 항
